# Supabase local development config — Site Rápido CRM
# https://supabase.com/docs/guides/cli/config

project_id = "siterapido"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["https://127.0.0.1:5173"]
jwt_expiry = 3600
enable_signup = true

[functions.asaas-create-subscription]
verify_jwt = false

[functions.asaas-cancel-subscription]
verify_jwt = false

[functions.asaas-webhook]
verify_jwt = false
